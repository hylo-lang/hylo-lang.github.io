# Dependabot configuration. See:
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  # Keep GitHub Actions used by workflows up-to-date.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - "*"

  # Keep npm dependencies (Astro, Starlight, Tailwind, etc.) up-to-date.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    groups:
      npm-minor-and-patch:
        update-types:
          - minor
          - patch
